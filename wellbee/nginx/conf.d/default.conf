upstream app_prod {
    server app-prod:8000;
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name api.wellbee-studio.com review.wellbee-studio.com;
    return 301 https://$host$request_uri;
}

# 本番用（現行ユーザーが使うAPI）
server {
    listen 443 ssl;
    server_name api.wellbee-studio.com;

    ssl_certificate     /etc/letsencrypt/live/api.wellbee-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wellbee-studio.com/privkey.pem;

    location /static/ {
        alias /static/;
    }

    location / {
        proxy_pass http://app_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}

# 審査用（App Store / Google Play 審査チームが使うAPI）
# app-review が起動していない時は 502 を返すが Nginx 自体はクラッシュしない
server {
    listen 443 ssl;
    server_name review.wellbee-studio.com;

    ssl_certificate     /etc/letsencrypt/live/api.wellbee-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.wellbee-studio.com/privkey.pem;

    location /static/ {
        alias /static/;
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream_review app-review:8000;
        proxy_pass http://$upstream_review;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}
