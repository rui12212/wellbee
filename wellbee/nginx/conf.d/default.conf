upstream app_prod {
    server app-prod:8000;
}

upstream app_review {
    server app-review:8000;
}

# 本番用（現行ユーザーが使うAPI）
server {
    listen 80;
    server_name api.wellbee-studio.com;

    location /static/ {
        alias /static/;
    }

    location / {
        proxy_pass http://app_prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}

# 審査用（App Store / Google Play 審査チームが使うAPI）
# app-review が起動しているときのみ有効
server {
    listen 80;
    server_name review.wellbee-studio.com;

    location /static/ {
        alias /static/;
    }

    location / {
        proxy_pass http://app_review;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }
}
