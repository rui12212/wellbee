version: '3.9'

# Instance 2（DBサーバー）専用
# このファイルは絶対に docker compose down しないこと
# 停止する場合は: docker compose -f docker-compose.db.yml stop db
#
# 初回起動: docker compose -f docker-compose.db.yml up -d
# ログ確認: docker compose -f docker-compose.db.yml logs db

services:
  db:
    container_name: mysql
    image: mysql:8.0
    restart: always
    env_file:
      - .env.db
    expose:
      - "3306"
    ports:
      # Lightsailファイアウォールで Instance 1 のプライベートIPのみ許可すること
      # （インターネットからは絶対に開放しない）
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  db_data:
