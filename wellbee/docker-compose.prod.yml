version: '3.9'

# Instance 1（アプリサーバー）用
# DBはInstance 2で docker-compose.db.yml を使って起動する
# .env.prod の DATABASE_HOST に Instance 2 のプライベートIPを設定すること

services:
  app-prod:
    container_name: app-prod
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - static:/wellbee/static
    env_file:
      - .env.prod
    restart: always

  # 審査提出時のみ起動する（通常は停止していてよい）
  # 起動: docker compose -f docker-compose.prod.yml --profile review up -d app-review
  app-review:
    container_name: app-review
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - static:/wellbee/static
    env_file:
      - .env.prod
    restart: always
    profiles:
      - review

  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    volumes:
      - static:/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app-prod
    restart: always

volumes:
  static:
